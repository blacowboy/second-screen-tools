<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d5c"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="256" height="256" rx="32" fill="url(#bgGradient)"/>
  
  <!-- 时钟卡片 -->
  <g transform="translate(48, 60)">
    <!-- 小时 -->
    <rect x="0" y="0" width="40" height="56" rx="6" fill="url(#cardGradient)" stroke="#e94560" stroke-width="2"/>
    <rect x="44" y="0" width="40" height="56" rx="6" fill="url(#cardGradient)" stroke="#e94560" stroke-width="2"/>
    
    <!-- 分隔符 -->
    <text x="92" y="42" font-family="Arial" font-size="32" font-weight="bold" fill="#e94560">:</text>
    
    <!-- 分钟 -->
    <rect x="104" y="0" width="40" height="56" rx="6" fill="url(#cardGradient)" stroke="#e94560" stroke-width="2"/>
    <rect x="148" y="0" width="40" height="56" rx="6" fill="url(#cardGradient)" stroke="#e94560" stroke-width="2"/>
  </g>
  
  <!-- 文字 -->
  <text x="128" y="180" font-family="STKaiti, KaiTi, serif" font-size="24" fill="#ffffff" text-anchor="middle">翻页时钟</text>
  
  <!-- 装饰点 -->
  <circle cx="128" cy="200" r="3" fill="#e94560"/>
</svg>